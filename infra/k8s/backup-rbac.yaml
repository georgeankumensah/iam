apiVersion: v1
kind: ServiceAccount
metadata:
  name: iam-backup-sa
  namespace: iam-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: iam-backup-s3-access
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - iam-db
      - iam-backup-gpg
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: iam-backup-secret-reader
  namespace: iam-system
subjects:
  - kind: ServiceAccount
    name: iam-backup-sa
    namespace: iam-system
roleRef:
  kind: ClusterRole
  name: iam-backup-s3-access
  apiGroup: rbac.authorization.k8s.io
