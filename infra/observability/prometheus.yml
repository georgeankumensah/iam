# Prometheus scrape config for IAM System 19 (IAM-N08/N05).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: iam-django
    metrics_path: /health/metrics
    static_configs:
      - targets: ["django:8000"]

  - job_name: zitadel
    metrics_path: /debug/metrics
    static_configs:
      - targets: ["zitadel:8080"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
