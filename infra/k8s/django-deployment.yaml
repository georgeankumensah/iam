apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-django
  namespace: iam-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: iam-django
  template:
    metadata:
      labels:
        app: iam-django
    spec:
      containers:
        - name: django
          image: clet/iam-django:latest
          ports:
            - containerPort: 8000
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings.prod"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: iam-db
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iam-db
                  key: password
            - name: ZITADEL_SERVICE_ACCOUNT_JWT
              valueFrom:
                secretKeyRef:
                  name: iam-zitadel
                  key: service-account-jwt
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: iam-django
  namespace: iam-system
spec:
  selector:
    app: iam-django
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: iam-django
  namespace: iam-system
spec:
  selector:
    app: iam-django
  ports:
    - port: 8000
      targetPort: 8000
