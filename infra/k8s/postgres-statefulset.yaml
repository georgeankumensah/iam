apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: iam-system
data:
  POSTGRES_DB: "iam"
  POSTGRES_USER: "iam"
  POSTGRES_REPLICATION_USER: "replicator"
  postgresql.conf: |
    wal_level = replica
    max_wal_senders = 3
    max_replication_slots = 3
    hot_standby = on
    hot_standby_feedback = on
    wal_keep_size = 512
    shared_buffers = 256MB
    effective_cache_size = 768MB
    work_mem = 16MB
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: iam-system
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-in-prod"
  POSTGRES_REPLICATION_PASSWORD: "change-me-repl"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: iam-system
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: iam-system
spec:
  serviceName: postgres
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      initContainers:
        - name: init-replication
          image: postgres:16-alpine
          env:
            - name: POSTGRES_REPLICATION_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_REPLICATION_USER
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_REPLICATION_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          command:
            - sh
            - -c
            - |
              if [ ! -f "$PGDATA/PG_VERSION" ]; then
                if [ "$(hostname)" != "postgres-0" ]; then
                  pg_basebackup -h postgres-0.postgres -D "$PGDATA" -U "$POSTGRES_REPLICATION_USER" -P -v -R
                fi
              fi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
            - name: POSTGRES_REPLICATION_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_REPLICATION_USER
            - name: POSTGRES_REPLICATION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_REPLICATION_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "iam"]
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "iam"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-config
          configMap:
            name: postgres-config
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 50Gi
        storageClassName: standard
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-primary
  namespace: iam-system
  labels:
    app: postgres
    role: primary
spec:
  selector:
    statefulset.kubernetes.io/pod-name: postgres-0
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: iam-system
  labels:
    app: postgres
    role: replica
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
