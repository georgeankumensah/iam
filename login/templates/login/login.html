<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — IAM</title>
    <script src="https://unpkg.com/htmx.org@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { font-size: 24px; color: #1a1a2e; }
        .logo p { color: #6b7280; font-size: 14px; margin-top: 4px; }
        .error { background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 4px; }
        .field input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
        .field input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .links { text-align: center; margin-top: 16px; }
        .links a { color: #2563eb; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>CLET IAM</h1>
            <p>Sign in to your account</p>
        </div>
        {% if error %}
        <div class="error">{{ error_description }}</div>
        {% endif %}
        <form method="POST" action="/login/">
            <input type="hidden" name="authRequest" value="{{ auth_request }}">
            <div class="field">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="links">
            <a href="/login/password-reset">Forgot password?</a>
        </div>
    </div>
</body>
</html>
