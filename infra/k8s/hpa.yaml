apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iam-django
  namespace: iam-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iam-django
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: iam-celery-worker
  namespace: iam-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: iam-celery-worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
