apiVersion: apps/v1
kind: Deployment
metadata:
  name: iam-celery-worker
  namespace: iam-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iam-celery-worker
  template:
    metadata:
      labels:
        app: iam-celery-worker
    spec:
      containers:
        - name: worker
          image: clet/iam-django:latest
          command: ["celery", "-A", "config.celery_app", "worker", "--loglevel=info", "--concurrency=4", "--max-tasks-per-child=1000"]
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "config.settings.prod"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: iam-db
                  key: host
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iam-db
                  key: password
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: iam-redis
                  key: url
            - name: CELERY_WORKER
              value: "1"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            exec:
              command: ["celery", "-A", "config.celery_app", "inspect", "ping", "-d", "celery@$HOSTNAME"]
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: iam-celery-worker
  namespace: iam-system
  labels:
    app: iam-celery-worker
spec:
  selector:
    app: iam-celery-worker
  ports:
    - port: 8001
      targetPort: 8001
      name: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: iam-celery-worker
  namespace: iam-system
spec:
  selector:
    matchLabels:
      app: iam-celery-worker
  endpoints:
    - port: metrics
      path: /health/metrics
      interval: 15s
