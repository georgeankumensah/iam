services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: iam_dev
      POSTGRES_USER: iam
      POSTGRES_PASSWORD: iam_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam -d iam_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI — view sent invite emails
      - "1025:1025"   # SMTP
    environment:
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: >
      start-from-init
      --masterkey "MasterkeyNeedsW0rds!AndL0ng!!xyz"
      --tlsMode disabled
      --steps /config/steps.yaml
    ports:
      - "8080:8080"
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel_dev_password
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: iam
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: iam_dev_password
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_LOG_LEVEL: info

    volumes:
      - ./zitadel:/config:ro
      - ./zitadel/machinekey:/machinekey
    healthcheck:
      disable: true
    depends_on:
      db:
        condition: service_healthy

  django:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py seed_iam &&
             python manage.py setup_systems --wait 90 --best-effort &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DB_HOST: db
      DB_PASSWORD: iam_dev_password
      CELERY_BROKER_URL: redis://redis:6379/0
      ZITADEL_HOST: ${ZITADEL_HOST:-http://zitadel:8080}
      ZITADEL_INTERNAL_HOST: http://zitadel:8080
      ZITADEL_MACHINE_KEY_PATH: /machinekey/zitadel-admin-sa.json
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
      ZITADEL_ORG_ID: ${ZITADEL_ORG_ID}
      ZITADEL_SERVICE_ACCOUNT_JWT: ${ZITADEL_SERVICE_ACCOUNT_JWT}
      OIDC_RP_CLIENT_ID: ${OIDC_RP_CLIENT_ID}
      OIDC_RP_CLIENT_SECRET: ${OIDC_RP_CLIENT_SECRET}
    volumes:
      - .:/app
      - /app/.venv
      - ./zitadel/machinekey:/machinekey
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
      zitadel:
        condition: service_started

  celery-worker:
    build: .
    command: celery -A config.celery worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DB_HOST: db
      DB_PASSWORD: iam_dev_password
      CELERY_BROKER_URL: redis://redis:6379/0
      ZITADEL_HOST: ${ZITADEL_HOST:-http://zitadel:8080}
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      - db
      - redis

  celery-beat:
    build: .
    command: celery -A config.celery beat -l info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DB_HOST: db
      DB_PASSWORD: iam_dev_password
      CELERY_BROKER_URL: redis://redis:6379/0
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      - db
      - redis

  login-app:
    build:
      context: ./login-app
      dockerfile: Dockerfile
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      ZITADEL_API_URL: ${ZITADEL_HOST:-http://zitadel:8080}
      ZITADEL_SERVICE_USER_TOKEN_FILE: /machinekey/zitadel-admin-sa.json
      NEXT_PUBLIC_BASE_PATH: ""
      IAM_API_URL: http://django:8000
      ONBOARDING_INTERNAL_SECRET: ${ONBOARDING_INTERNAL_SECRET:-change-me-internal}
    volumes:
      - ./login-app:/app
      - /app/node_modules
      - /app/.next
      - ./zitadel/machinekey:/machinekey
    depends_on:
      zitadel:
        condition: service_started

volumes:
  pgdata:
