<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — IAM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 420px; }
        h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .success { background: #f0fdf4; color: #16a34a; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        .field { margin-bottom: 16px; }
        .field input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; }
        .field input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
        .links { text-align: center; margin-top: 16px; }
        .links a { color: #2563eb; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset Password</h1>
        {% if sent %}
        <div class="success">If an account exists with that email, a password reset link has been sent.</div>
        <div class="links"><a href="/login/">Back to sign in</a></div>
        {% else %}
        <p>Enter your email and we'll send you a reset link.</p>
        <form method="POST" action="/login/password-reset">
            <div class="field">
                <input type="email" name="email" required autofocus placeholder="your@email.com">
            </div>
            <button type="submit" class="btn">Send Reset Link</button>
        </form>
        <div class="links"><a href="/login/">Back to sign in</a></div>
        {% endif %}
    </div>
</body>
</html>
