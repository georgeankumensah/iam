<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Application — IAM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 420px; }
        h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .error { background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        .scopes { background: #f9fafb; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
        .scopes li { list-style: none; padding: 4px 0; font-size: 14px; color: #374151; }
        .scopes li:before { content: "✓ "; color: #16a34a; }
        .actions { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-align: center; }
        .btn-primary { background: #2563eb; color: white; border: none; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: white; color: #374151; border: 1px solid #d1d5db; }
        .btn-secondary:hover { background: #f9fafb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Authorize Application</h1>
        <p>The application is requesting access to your account.</p>
        {% if error %}
        <div class="error">{{ error_description }}</div>
        {% endif %}
        <div class="scopes">
            <strong>This application will be able to:</strong>
            <ul>
                <li>View your email address</li>
                <li>View your profile information</li>
                <li>Verify your identity</li>
            </ul>
        </div>
        <form method="POST" action="/login/consent">
            <input type="hidden" name="authRequest" value="{{ auth_request }}">
            <div class="actions">
                <button type="submit" name="approve" value="false" class="btn btn-secondary">Deny</button>
                <button type="submit" name="approve" value="true" class="btn btn-primary">Approve</button>
            </div>
        </form>
    </div>
</body>
</html>
