<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA — SMS Code</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 420px; }
        h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 8px; }
        p { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
        .error { background: #fef2f2; color: #dc2626; padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
        .field { margin-bottom: 16px; }
        .field input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 24px; text-align: center; letter-spacing: 8px; }
        .field input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SMS Code</h1>
        <p>A verification code was sent to your registered phone number.</p>
        {% if error %}
        <div class="error">{{ error_description }}</div>
        {% endif %}
        <form method="POST" action="/login/mfa/sms/">
            <input type="hidden" name="authRequest" value="{{ auth_request }}">
            <input type="hidden" name="sessionId" value="{{ session_id }}">
            <div class="field">
                <input type="text" name="code" pattern="[0-9]{6}" inputmode="numeric" maxlength="6" required autofocus placeholder="000000">
            </div>
            <button type="submit" class="btn">Verify</button>
        </form>
    </div>
</body>
</html>
